<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <rect x="0.5" y="0.5" width="999" height="359" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>

  <!-- header -->
  <text x="28" y="40" font-size="16" font-weight="700" fill="#1E2440">Trace: GET /orders · total 800 ms</text>
  <rect x="700" y="20" width="272" height="30" rx="15" fill="#EEF1FB" stroke="#C5CAE9"/>
  <text x="836" y="39" font-size="12" fill="#3F51B5" text-anchor="middle" font-family="Consolas, monospace">Trace ID: 4bf92f35…0e4736</text>

  <!-- time grid -->
  <g stroke="#E7EAF6">
    <line x1="270" y1="72" x2="270" y2="300"/>
    <line x1="442.5" y1="72" x2="442.5" y2="300"/>
    <line x1="615" y1="72" x2="615" y2="300"/>
    <line x1="787.5" y1="72" x2="787.5" y2="300"/>
    <line x1="960" y1="72" x2="960" y2="300"/>
  </g>
  <g font-size="11" fill="#7A819C" text-anchor="middle">
    <text x="270" y="64">0 ms</text>
    <text x="442.5" y="64">200 ms</text>
    <text x="615" y="64">400 ms</text>
    <text x="787.5" y="64">600 ms</text>
    <text x="960" y="64">800 ms</text>
  </g>

  <!-- rows -->
  <g font-size="13" fill="#1E2440">
    <text x="28" y="112">SERVER · gateway</text>
    <text x="28" y="167">INTERNAL · gateway processing</text>
    <text x="28" y="222">CLIENT · cache access</text>
    <text x="28" y="277">CLIENT · upstream call</text>
  </g>

  <!-- bars -->
  <rect x="270" y="90" width="690" height="34" rx="5" fill="#3F51B5"/>
  <text x="615" y="112" font-size="12.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">800 ms</text>

  <rect x="270" y="145" width="43" height="34" rx="5" fill="#7986CB"/>
  <text x="323" y="167" font-size="12" fill="#5C6BC0">50 ms</text>

  <rect x="313" y="200" width="86" height="34" rx="5" fill="#9FA8DA"/>
  <text x="409" y="222" font-size="12" fill="#5C6BC0">100 ms</text>

  <rect x="399" y="255" width="561" height="34" rx="5" fill="#E8710A"/>
  <text x="679.5" y="277" font-size="12.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">650 ms</text>

  <!-- footer -->
  <text x="28" y="336" font-size="12" fill="#7A819C">All four spans share the same Trace ID; the latency breakdown appears on a single timeline (waterfall).</text>
</svg>
