<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrInd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3F51B5"/>
    </marker>
    <marker id="arrGrn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0E7C66"/>
    </marker>
    <marker id="arrGry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect x="0.5" y="0.5" width="999" height="599" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>

  <!-- Layer 1 -->
  <rect x="60" y="30" width="880" height="120" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="84" y="60" font-size="15" font-weight="700" fill="#3F51B5">1 · Instrumentation Layer</text>
  <text x="84" y="80" font-size="12" fill="#7A819C">Produces telemetry: without code changes, or via the SDK</text>
  <rect x="84" y="92" width="330" height="44" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="249" y="111" font-size="12.5" font-weight="600" fill="#1E2440" text-anchor="middle">OTel Java Agent</text>
  <text x="249" y="127" font-size="11" fill="#7A819C" text-anchor="middle">auto-instrumentation (javaagent)</text>
  <rect x="440" y="92" width="330" height="44" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="605" y="111" font-size="12.5" font-weight="600" fill="#1E2440" text-anchor="middle">OTel SDKs</text>
  <text x="605" y="127" font-size="11" fill="#7A819C" text-anchor="middle">.NET, Go, Python, Node.js, …</text>

  <!-- arrow L1 -> L2 -->
  <line x1="500" y1="150" x2="500" y2="198" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arrInd)"/>
  <text x="514" y="180" font-size="11.5" fill="#3F51B5">OTLP · HTTP :4318 · gRPC :4317</text>

  <!-- Layer 2 -->
  <rect x="60" y="200" width="880" height="150" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="84" y="230" font-size="15" font-weight="700" fill="#3F51B5">2 · Collection and Processing Layer: OpenTelemetry Collector</text>
  <rect x="84" y="248" width="180" height="52" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="174" y="270" font-size="12.5" font-weight="600" fill="#1E2440" text-anchor="middle">Receivers</text>
  <text x="174" y="288" font-size="10.5" fill="#7A819C" text-anchor="middle">otlp · prometheus</text>
  <line x1="264" y1="274" x2="300" y2="274" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arrInd)"/>
  <rect x="302" y="248" width="200" height="52" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="402" y="270" font-size="12.5" font-weight="600" fill="#1E2440" text-anchor="middle">Processors</text>
  <text x="402" y="288" font-size="10.5" fill="#7A819C" text-anchor="middle">filter · k8sattributes · transform · batch</text>
  <line x1="502" y1="274" x2="538" y2="274" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arrInd)"/>
  <rect x="540" y="248" width="190" height="52" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="635" y="270" font-size="12.5" font-weight="600" fill="#1E2440" text-anchor="middle">Connectors</text>
  <text x="635" y="288" font-size="10.5" fill="#7A819C" text-anchor="middle">spanmetrics · servicegraph</text>
  <line x1="730" y1="274" x2="766" y2="274" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arrInd)"/>
  <rect x="768" y="248" width="148" height="52" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="842" y="270" font-size="12.5" font-weight="600" fill="#1E2440" text-anchor="middle">Exporters</text>
  <text x="842" y="288" font-size="10.5" fill="#7A819C" text-anchor="middle">tempo · prometheus :8889</text>
  <text x="84" y="330" font-size="11.5" fill="#7A819C">Ingests data, enriches it, derives metrics from traces, and exports to backends</text>

  <!-- arrows L2 -> L3 -->
  <line x1="350" y1="350" x2="350" y2="398" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arrInd)"/>
  <text x="364" y="380" font-size="11.5" fill="#3F51B5">traces (OTLP)</text>
  <line x1="650" y1="350" x2="650" y2="398" stroke="#0E7C66" stroke-width="1.8" marker-end="url(#arrGrn)"/>
  <text x="664" y="380" font-size="11.5" fill="#0E7C66">metrics</text>

  <!-- Layer 3 -->
  <rect x="60" y="400" width="880" height="160" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="84" y="430" font-size="15" font-weight="700" fill="#3F51B5">3 · Storage and Visualization Layer</text>

  <!-- Tempo cylinder -->
  <path d="M275,469 L275,523 A75,12 0 0 0 425,523 L425,469 Z" fill="#EEF1FB" stroke="#9FA8DA"/>
  <ellipse cx="350" cy="469" rx="75" ry="12" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="350" y="502" font-size="13" font-weight="600" fill="#1E2440" text-anchor="middle">Tempo</text>
  <text x="350" y="518" font-size="10.5" fill="#7A819C" text-anchor="middle">trace store</text>

  <!-- Prometheus cylinder -->
  <path d="M575,469 L575,523 A75,12 0 0 0 725,523 L725,469 Z" fill="#E6F4F0" stroke="#7FC6B6"/>
  <ellipse cx="650" cy="469" rx="75" ry="12" fill="#E6F4F0" stroke="#7FC6B6"/>
  <text x="650" y="502" font-size="13" font-weight="600" fill="#1E2440" text-anchor="middle">Prometheus</text>
  <text x="650" y="518" font-size="10.5" fill="#7A819C" text-anchor="middle">metric store (TSDB)</text>

  <!-- Grafana -->
  <rect x="790" y="462" width="140" height="66" rx="8" fill="#FFF4E8" stroke="#E8B27A"/>
  <text x="860" y="490" font-size="13" font-weight="700" fill="#B4610E" text-anchor="middle">Grafana</text>
  <text x="860" y="508" font-size="10.5" fill="#7A819C" text-anchor="middle">dashboards · Explore</text>

  <line x1="725" y1="495" x2="787" y2="495" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrGry)"/>
  <path d="M425,486 C 470,466 740,466 787,482" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrGry)"/>
  <text x="500" y="461" font-size="10.5" fill="#64748B" text-anchor="middle">query</text>
</svg>
