<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrInd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3F51B5"/>
    </marker>
    <marker id="arrGrn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0E7C66"/>
    </marker>
    <marker id="arrGry" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>
  <rect x="0.5" y="0.5" width="999" height="659" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>

  <!-- ================= Worker namespace ================= -->
  <rect x="190" y="80" width="255" height="330" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="206" y="106" font-size="13" font-weight="700" fill="#3F51B5">Namespace: &lt;worker-namespace&gt;</text>

  <!-- Pod -->
  <rect x="206" y="118" width="223" height="176" rx="8" fill="#FFFFFF" stroke="#C5CAE9" stroke-dasharray="4 3"/>
  <text x="220" y="140" font-size="12" font-weight="600" fill="#5C6BC0">Pod: worker</text>

  <rect x="222" y="150" width="191" height="48" rx="6" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="317.5" y="170" font-size="12.5" font-weight="600" fill="#1E2440" text-anchor="middle">OTel Java Agent</text>
  <text x="317.5" y="186" font-size="10.5" fill="#7A819C" text-anchor="middle">auto-instrumentation</text>

  <line x1="317.5" y1="198" x2="317.5" y2="216" stroke="#5C6BC0" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrInd)"/>
  <text x="326" y="212" font-size="10.5" fill="#5C6BC0">produces spans</text>

  <rect x="222" y="218" width="191" height="60" rx="6" fill="#3F51B5"/>
  <text x="317.5" y="243" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Apinizer Gateway</text>
  <text x="317.5" y="260" font-size="11" fill="#C5CAE9" text-anchor="middle">worker container</text>

  <line x1="317.5" y1="294" x2="317.5" y2="310" stroke="#94A3B8" stroke-width="1.2"/>
  <rect x="206" y="310" width="223" height="54" rx="6" fill="#E6F4F0" stroke="#7FC6B6"/>
  <text x="317.5" y="331" font-size="12.5" font-weight="600" fill="#0E7C66" text-anchor="middle">Native metrics</text>
  <text x="317.5" y="347" font-size="10.5" fill="#5B8C81" text-anchor="middle">:9091 (worker port)</text>

  <!-- ================= Client ================= -->
  <rect x="25" y="218" width="130" height="60" rx="8" fill="#F5F7FE" stroke="#9FA8DA"/>
  <text x="90" y="253" font-size="13" font-weight="600" fill="#1E2440" text-anchor="middle">API Client</text>
  <line x1="155" y1="248" x2="220" y2="248" stroke="#64748B" stroke-width="1.8" marker-end="url(#arrGry)"/>
  <text x="188" y="238" font-size="11" fill="#64748B" text-anchor="middle">HTTP request</text>

  <!-- ================= Monitoring namespace ================= -->
  <rect x="480" y="40" width="300" height="450" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="496" y="66" font-size="13" font-weight="700" fill="#3F51B5">Namespace: monitoring</text>

  <!-- Collector -->
  <rect x="496" y="78" width="268" height="272" rx="8" fill="#FFFFFF" stroke="#C5CAE9"/>
  <text x="630" y="100" font-size="12.5" font-weight="700" fill="#3F51B5" text-anchor="middle">OpenTelemetry Collector</text>

  <rect x="512" y="110" width="236" height="42" rx="6" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="630" y="127" font-size="12" font-weight="600" fill="#1E2440" text-anchor="middle">Receivers</text>
  <text x="630" y="143" font-size="10" fill="#7A819C" text-anchor="middle">otlp :4318 · prometheus scrape</text>
  <line x1="630" y1="152" x2="630" y2="164" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arrInd)"/>

  <rect x="512" y="166" width="236" height="42" rx="6" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="630" y="183" font-size="12" font-weight="600" fill="#1E2440" text-anchor="middle">Processors</text>
  <text x="630" y="199" font-size="10" fill="#7A819C" text-anchor="middle">filter · k8sattributes · transform · batch</text>
  <line x1="630" y1="208" x2="630" y2="220" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arrInd)"/>

  <rect x="512" y="222" width="236" height="42" rx="6" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="630" y="239" font-size="12" font-weight="600" fill="#1E2440" text-anchor="middle">Connectors</text>
  <text x="630" y="255" font-size="10" fill="#7A819C" text-anchor="middle">spanmetrics · servicegraph</text>
  <line x1="630" y1="264" x2="630" y2="276" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arrInd)"/>

  <rect x="512" y="278" width="112" height="52" rx="6" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="568" y="300" font-size="11.5" font-weight="600" fill="#1E2440" text-anchor="middle">otlp/tempo</text>
  <text x="568" y="316" font-size="10" fill="#7A819C" text-anchor="middle">trace exporter</text>
  <rect x="636" y="278" width="112" height="52" rx="6" fill="#E6F4F0" stroke="#7FC6B6"/>
  <text x="692" y="300" font-size="11.5" font-weight="600" fill="#0E7C66" text-anchor="middle">prometheus</text>
  <text x="692" y="316" font-size="10" fill="#5B8C81" text-anchor="middle">exporter :8889</text>

  <!-- Tempo -->
  <path d="M505,397 L505,453 A60,12 0 0 0 625,453 L625,397 Z" fill="#EEF1FB" stroke="#9FA8DA"/>
  <ellipse cx="565" cy="397" rx="60" ry="12" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="565" y="430" font-size="13" font-weight="600" fill="#1E2440" text-anchor="middle">Tempo</text>
  <text x="565" y="446" font-size="10.5" fill="#7A819C" text-anchor="middle">trace store</text>

  <!-- Prometheus Agent -->
  <rect x="648" y="390" width="118" height="72" rx="6" fill="#E6F4F0" stroke="#7FC6B6"/>
  <text x="707" y="412" font-size="12" font-weight="600" fill="#0E7C66" text-anchor="middle">Prometheus</text>
  <text x="707" y="428" font-size="12" font-weight="600" fill="#0E7C66" text-anchor="middle">Agent</text>
  <text x="707" y="446" font-size="9.5" fill="#5B8C81" text-anchor="middle">scrape + remote_write</text>

  <!-- ================= Central ================= -->
  <rect x="810" y="110" width="175" height="330" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="897.5" y="136" font-size="12" font-weight="700" fill="#3F51B5" text-anchor="middle">Central Observability</text>

  <path d="M827,167 L827,228 A70,12 0 0 0 967,228 L967,167 Z" fill="#E6F4F0" stroke="#7FC6B6"/>
  <ellipse cx="897" cy="167" rx="70" ry="12" fill="#E6F4F0" stroke="#7FC6B6"/>
  <text x="897" y="200" font-size="11.5" font-weight="600" fill="#1E2440" text-anchor="middle">Central Prometheus</text>
  <text x="897" y="216" font-size="10" fill="#5B8C81" text-anchor="middle">remote-write receiver</text>

  <rect x="827" y="330" width="140" height="64" rx="8" fill="#FFF4E8" stroke="#E8B27A"/>
  <text x="897" y="357" font-size="13" font-weight="700" fill="#B4610E" text-anchor="middle">Grafana</text>
  <text x="897" y="374" font-size="10.5" fill="#7A819C" text-anchor="middle">Explore · Dashboards</text>

  <!-- ================= Edges ================= -->
  <!-- Worker -> Receivers (trace push) -->
  <path d="M413,240 C 462,240 468,124 510,124" fill="none" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arrInd)"/>
  <text x="444" y="208" font-size="10.5" fill="#3F51B5" text-anchor="end">OTLP :4318</text>

  <!-- Native -> Receivers (scrape, pull) -->
  <path d="M429,337 C 472,337 476,148 510,148" fill="none" stroke="#0E7C66" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrGrn)"/>
  <text x="450" y="326" font-size="10.5" fill="#0E7C66" text-anchor="middle">scrape :9091</text>

  <!-- otlp/tempo -> Tempo -->
  <line x1="568" y1="330" x2="566" y2="383" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arrInd)"/>
  <text x="560" y="366" font-size="10.5" fill="#3F51B5" text-anchor="end">OTLP :4317</text>

  <!-- :8889 -> Prometheus Agent (scrape) -->
  <line x1="697" y1="330" x2="705" y2="388" stroke="#0E7C66" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrGrn)"/>
  <text x="710" y="366" font-size="10.5" fill="#0E7C66">scrape :8889</text>

  <!-- Prometheus Agent -> Central Prometheus (remote_write) -->
  <path d="M766,415 C 800,415 798,205 825,201" fill="none" stroke="#0E7C66" stroke-width="1.8" marker-end="url(#arrGrn)"/>
  <text x="786" y="335" font-size="10.5" fill="#0E7C66" text-anchor="end">remote_write</text>

  <!-- Tempo -> Grafana (query) -->
  <path d="M565,467 L565,530 L897,530 L897,398" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrGry)"/>
  <text x="723" y="522" font-size="10.5" fill="#64748B" text-anchor="middle">trace query</text>

  <!-- Central Prometheus -> Grafana (query) -->
  <line x1="897" y1="242" x2="897" y2="326" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrGry)"/>
  <text x="905" y="288" font-size="10.5" fill="#64748B">metric query</text>

  <!-- ================= Legend ================= -->
  <g font-size="11" fill="#475569">
    <line x1="25" y1="620" x2="55" y2="620" stroke="#3F51B5" stroke-width="1.8"/>
    <text x="62" y="624">trace flow (push)</text>
    <line x1="185" y1="620" x2="215" y2="620" stroke="#0E7C66" stroke-width="1.6" stroke-dasharray="5 4"/>
    <text x="222" y="624">metric scrape (pull)</text>
    <line x1="360" y1="620" x2="390" y2="620" stroke="#0E7C66" stroke-width="1.8"/>
    <text x="397" y="624">metric remote_write (push)</text>
    <line x1="580" y1="620" x2="610" y2="620" stroke="#64748B" stroke-width="1.5"/>
    <text x="617" y="624">Grafana queries</text>
  </g>
</svg>
