<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <rect x="0.5" y="0.5" width="999" height="399" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="60" y="44" font-size="16" font-weight="700" fill="#3F51B5">RED Metodu — istek odaklı servisler için üç soru</text>
  <text x="60" y="66" font-size="12" fill="#7A819C">Tom Wilkie'nin (Weaveworks) mikroservis izleme için önerdiği model; API Gateway gibi her işi "istek" olan sistemlere birebir oturur</text>

  <!-- R panel -->
  <rect x="60" y="88" width="272" height="212" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="84" y="136" font-size="34" font-weight="700" fill="#3F51B5">R</text>
  <text x="112" y="136" font-size="14" font-weight="700" fill="#1E2440">Rate — İstek Hızı</text>
  <text x="84" y="166" font-size="12.5" font-weight="600" fill="#1E2440">Sistem ne kadar iş yapıyor?</text>
  <text x="84" y="186" font-size="11.5" fill="#7A819C">Saniyedeki istek sayısı (req/s);</text>
  <text x="84" y="202" font-size="11.5" fill="#7A819C">trafiğin nabzı ve kapasite planının girdisi</text>
  <rect x="84" y="218" width="224" height="58" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="196" y="242" font-size="10.5" font-family="Consolas, monospace" fill="#1E2440" text-anchor="middle">apinizer_trace_calls_total</text>
  <text x="196" y="260" font-size="10.5" font-family="Consolas, monospace" fill="#7A819C" text-anchor="middle">rate(...[$__rate_interval])</text>

  <!-- E panel -->
  <rect x="364" y="88" width="272" height="212" rx="10" fill="#FDF4F4" stroke="#E8C5C5"/>
  <text x="388" y="136" font-size="34" font-weight="700" fill="#B3261E">E</text>
  <text x="416" y="136" font-size="14" font-weight="700" fill="#1E2440">Errors — Hatalar</text>
  <text x="388" y="166" font-size="12.5" font-weight="600" fill="#1E2440">İsteklerin ne kadarı başarısız?</text>
  <text x="388" y="186" font-size="11.5" fill="#7A819C">Hatalı isteklerin toplam isteğe oranı (%);</text>
  <text x="388" y="202" font-size="11.5" fill="#7A819C">"hata" tanımı metriğe göre değişir</text>
  <rect x="388" y="218" width="224" height="58" rx="8" fill="#FFFFFF" stroke="#DBA8A8"/>
  <text x="500" y="242" font-size="10.5" font-family="Consolas, monospace" fill="#1E2440" text-anchor="middle">status_code="STATUS_CODE_ERROR"</text>
  <text x="500" y="260" font-size="10.5" font-family="Consolas, monospace" fill="#7A819C" text-anchor="middle">http_response_status_code=~"5.."</text>

  <!-- D panel -->
  <rect x="668" y="88" width="272" height="212" rx="10" fill="#F0FAF7" stroke="#BCE0D5"/>
  <text x="692" y="136" font-size="34" font-weight="700" fill="#0E7C66">D</text>
  <text x="720" y="136" font-size="14" font-weight="700" fill="#1E2440">Duration — Süre</text>
  <text x="692" y="166" font-size="12.5" font-weight="600" fill="#1E2440">İstekler ne kadar sürüyor?</text>
  <text x="692" y="186" font-size="11.5" fill="#7A819C">Gecikme dağılımı: p50 · p95 · p99;</text>
  <text x="692" y="202" font-size="11.5" fill="#7A819C">ortalama değil, yüzdelikler konuşur</text>
  <rect x="692" y="218" width="224" height="58" rx="8" fill="#FFFFFF" stroke="#9CCFC0"/>
  <text x="804" y="242" font-size="10.5" font-family="Consolas, monospace" fill="#1E2440" text-anchor="middle">apinizer_trace_duration_..._bucket</text>
  <text x="804" y="260" font-size="10.5" font-family="Consolas, monospace" fill="#7A819C" text-anchor="middle">histogram_quantile(0.95, ...)</text>

  <!-- footer note -->
  <rect x="60" y="322" width="880" height="48" rx="10" fill="#F5F7FE" stroke="#C5CAE9"/>
  <text x="500" y="342" font-size="12" font-weight="600" fill="#3F51B5" text-anchor="middle">Üç soru birlikte kullanıcı deneyimini özetler — tek başına hiçbiri yeterli değil</text>
  <text x="500" y="360" font-size="11" fill="#7A819C" text-anchor="middle">Kaynak veri: spanmetrics connector'ın span'lerden türettiği metrikler (Collector :8889)</text>
</svg>
