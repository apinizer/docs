<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3F51B5"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="979" height="419" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="490" y="36" font-size="18" font-weight="700" fill="#1E2440" text-anchor="middle">RAG Ak1_1</text>
  <text x="490" y="56" font-size="12" fill="#64748B" text-anchor="middle">Embedding Provider + Vector DB + AI Proxy</text>

  <!-- API Client -->
  <rect x="30" y="170" width="130" height="70" rx="8" fill="#F5F7FE" stroke="#9FA8DA"/>
  <text x="95" y="200" font-size="13" font-weight="700" fill="#1E2440" text-anchor="middle">API Client</text>
  <text x="95" y="218" font-size="11" fill="#64748B" text-anchor="middle">Soru / 0stek</text>

  <line x1="160" y1="205" x2="210" y2="205" stroke="#3F51B5" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- AI Proxy -->
  <rect x="210" y="155" width="160" height="100" rx="8" fill="#3F51B5"/>
  <text x="290" y="195" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">AI Proxy</text>
  <text x="290" y="215" font-size="11" fill="#C5CAE9" text-anchor="middle">RAG Injection</text>
  <text x="290" y="233" font-size="11" fill="#C5CAE9" text-anchor="middle">+ Chat Routing</text>

  <!-- Knowledge Base top -->
  <rect x="420" y="40" width="170" height="70" rx="8" fill="#EEF1FB" stroke="#9FA8DA"/>
  <text x="505" y="68" font-size="13" font-weight="700" fill="#1E2440" text-anchor="middle">Knowledge Base</text>
  <text x="505" y="88" font-size="11" fill="#64748B" text-anchor="middle">Doküman / Chunk</text>

  <!-- Step 1 -->
  <circle cx="400" cy="100" r="12" fill="#3F51B5"/>
  <text x="400" y="104" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <line x1="370" y1="155" x2="420" y2="110" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Embedding Provider -->
  <rect x="630" y="40" width="200" height="70" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="730" y="68" font-size="13" font-weight="700" fill="#1E2440" text-anchor="middle">Embedding Provider</text>
  <text x="730" y="88" font-size="11" fill="#64748B" text-anchor="middle">Ollama / all-minilm</text>

  <line x1="590" y1="75" x2="630" y2="75" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="610" y="68" font-size="10" fill="#5C6BC0">vektör</text>

  <!-- Step 2 -->
  <circle cx="730" cy="145" r="12" fill="#3F51B5"/>
  <text x="730" y="149" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <line x1="730" y1="110" x2="730" y2="175" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Vector DB -->
  <rect x="630" y="175" width="200" height="70" rx="8" fill="#E6F4F0" stroke="#7FC6B6"/>
  <text x="730" y="203" font-size="13" font-weight="700" fill="#0E7C66" text-anchor="middle">Vector DB</text>
  <text x="730" y="223" font-size="11" fill="#5B8C81" text-anchor="middle">PgVector / ollama_kb</text>

  <!-- Step 3 context back -->
  <circle cx="505" cy="210" r="12" fill="#3F51B5"/>
  <text x="505" y="214" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <line x1="630" y1="210" x2="370" y2="210" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="500" y="198" font-size="10" fill="#5C6BC0">balam</text>

  <!-- Step 4 Chat LLM -->
  <circle cx="290" cy="300" r="12" fill="#3F51B5"/>
  <text x="290" y="304" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <line x1="290" y1="255" x2="290" y2="320" stroke="#3F51B5" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="210" y="320" width="160" height="60" rx="8" fill="#FFFFFF" stroke="#9FA8DA"/>
  <text x="290" y="345" font-size="13" font-weight="700" fill="#1E2440" text-anchor="middle">Chat LLM</text>
  <text x="290" y="363" font-size="11" fill="#64748B" text-anchor="middle">DeepSeek / phi3</text>

  <!-- Response back to client -->
  <path d="M210 350 C 150 350, 120 280, 95 240" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrGray)"/>
  <text x="130" y="300" font-size="10" fill="#64748B">yan1t</text>

  <!-- Legend -->
  <rect x="420" y="300" width="410" height="80" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="435" y="325" font-size="12" font-weight="700" fill="#1E2440">Ad1mlar</text>
  <text x="435" y="345" font-size="11" fill="#475569">1. Doküman/soru embedding modele gider</text>
  <text x="435" y="362" font-size="11" fill="#475569">2. Vektör PgVector'e yaz1l1r / benzer parçalar aran1r</text>
  <text x="700" y="345" font-size="11" fill="#475569">3. Balam AI Proxy'ye döner</text>
  <text x="700" y="362" font-size="11" fill="#475569">4. Chat LLM cevap üretir</text>
</svg>
